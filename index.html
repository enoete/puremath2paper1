<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--green:#1a6e3c;--green-light:#e8f5ee;--green-mid:#2d9e5c;--white:#fff;--bg:#f4f6f3;--card:#fff;--text:#1a1a1a;--muted:#555;--border:#d4e8db;--correct:#15803d;--correct-bg:#dcfce7;--wrong:#b91c1c;--wrong-bg:#fee2e2;--sel-bg:#dbeafe;--sel-border:#2563eb;--radius:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;min-height:100vh}
header{background:var(--green);color:white;padding:28px 36px 20px;position:relative;overflow:hidden}
header::after{content:'';position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,0.06)}
.header-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:900;letter-spacing:-0.5px;margin-bottom:4px}
.header-sub{font-size:13px;opacity:0.82;margin-bottom:16px}
.stats-bar{display:flex;gap:12px;flex-wrap:wrap}
.stat-pill{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600}
.controls{background:white;border-bottom:2px solid var(--border);padding:12px 36px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.filter-btn{border:2px solid var(--border);background:white;border-radius:20px;padding:5px 13px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;transition:all 0.15s;color:var(--text)}
.filter-btn:hover{border-color:var(--green);color:var(--green)}
.filter-btn.active{background:var(--green);border-color:var(--green);color:white}
.spacer{flex:1}
.score-display{font-weight:700;font-size:14px;color:var(--green);font-family:'JetBrains Mono',monospace}
.submit-all-btn{background:var(--green);color:white;border:none;border-radius:20px;padding:6px 18px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer}
.submit-all-btn:hover{background:#155c32}
.reset-btn{background:white;color:#b91c1c;border:2px solid #fca5a5;border-radius:20px;padding:5px 13px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer}
main{max-width:880px;margin:0 auto;padding:28px 16px 60px}
.topic-section{margin-bottom:36px}
.topic-heading{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 14px;border-radius:10px;background:var(--green-light);border-left:5px solid var(--green)}
.topic-icon{font-size:18px}
.topic-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--green)}
.topic-count{font-size:11px;color:var(--muted);margin-left:auto;font-weight:500}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;transition:box-shadow 0.15s}
.q-card:hover{box-shadow:0 4px 14px rgba(0,0,0,0.08)}
.q-card.hidden{display:none}
.q-header{padding:12px 16px 8px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px}
.q-num{background:var(--green);color:white;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0;margin-top:2px}
.q-meta{flex:1}
.q-freq{font-size:11px;color:var(--muted)}
.q-years{font-size:10px;color:#999;font-family:'JetBrains Mono',monospace}
.q-body{padding:14px 16px}
.q-stem{font-size:14.5px;line-height:1.6;margin-bottom:12px}
.q-stem strong{color:var(--green);font-weight:700}
.opts-grid{display:grid;gap:7px}
.opt-btn{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border:2px solid var(--border);border-radius:7px;background:white;cursor:pointer;text-align:left;font-family:inherit;font-size:13.5px;color:var(--text);transition:all 0.12s;width:100%;line-height:1.5}
.opt-btn:hover:not(:disabled){border-color:var(--green-mid);background:var(--green-light)}
.opt-label{background:var(--bg);border-radius:4px;padding:1px 6px;font-weight:700;font-size:12px;font-family:'JetBrains Mono',monospace;flex-shrink:0;margin-top:1px}
.opt-btn.selected{border-color:var(--sel-border);background:var(--sel-bg)}
.opt-btn.selected .opt-label{background:#2563eb;color:white}
.opt-btn.correct{border-color:var(--correct);background:var(--correct-bg)}
.opt-btn.correct .opt-label{background:var(--correct);color:white}
.opt-btn.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
.opt-btn.wrong .opt-label{background:var(--wrong);color:white}
.opt-btn:disabled{cursor:default}
.q-actions{display:flex;gap:8px;margin-top:10px;align-items:center}
.check-btn{background:var(--green);color:white;border:none;border-radius:7px;padding:6px 16px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer}
.check-btn:hover{background:#155c32}
.check-btn:disabled{background:#aaa;cursor:default}
.result-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;display:none}
.result-badge.correct{background:var(--correct-bg);color:var(--correct);display:inline-block}
.result-badge.wrong{background:var(--wrong-bg);color:var(--wrong);display:inline-block}
.explain-box{background:#f0fdf4;border:1px solid #86efac;border-radius:7px;padding:10px 12px;margin-top:10px;font-size:13px;color:#166534;display:none;line-height:1.6}
.explain-box.show{display:block}
.explain-box::before{content:'рҹ’Ў ';font-size:13px}
.score-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;align-items:center;justify-content:center}
.score-modal.show{display:flex}
.score-box{background:white;border-radius:18px;padding:36px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.25)}
.score-big{font-family:'Playfair Display',serif;font-size:68px;font-weight:900;color:var(--green);line-height:1}
.score-label{font-size:17px;font-weight:600;margin-top:8px;color:var(--muted)}
.score-msg{font-size:14px;margin:14px 0 22px;color:var(--text)}
.close-modal-btn{background:var(--green);color:white;border:none;border-radius:9px;padding:11px 26px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer}
.progress-bar{height:3px;background:var(--border);position:fixed;top:0;left:0;right:0;z-index:200}
.progress-fill{height:100%;background:var(--green);transition:width 0.3s;width:0%}
</style>

<script>
const QUESTIONS=[{"id": 1, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2009, 2013, 2015, 2016, 2020, 2022", "stem": "In how many ways can the letters PQRSTU be arranged so that the T and U are <strong>always together</strong>?", "opts": ["6!/2", "5!", "6!", "5! Г— 2"], "ans": "D", "explain": "Treat TU as one block вҶ’ 5 units вҶ’ 5! arrangements. TU or UT internally вҶ’ Г— 2. Answer = 5! Г— 2 = 240."}, {"id": 2, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2009, 2013, 2015, 2020, 2021, 2022, 2023", "stem": "From the letters A, B, C, D and E, the number of three-letter words that can be made if no letter is repeated is", "opts": ["5", "10", "60", "120"], "ans": "C", "explain": "Order matters and no repeats вҶ’ вҒөPвӮғ = 5 Г— 4 Г— 3 = 60."}, {"id": 3, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2020, 2021, 2022, 2023", "stem": "In how many ways can 3 boys and 2 girls sit in a row so that no 2 persons of the same sex sit next to each other?", "opts": ["5!", "3 Г— 2", "3! + 2!", "3! Г— 2!"], "ans": "D", "explain": "Boys and girls must alternate: B G B G B. Boys arrange in 3! ways, girls in 2! ways. Total = 3! Г— 2! = 12."}, {"id": 4, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2020, 2023", "stem": "Chad, Matthew, Josh, Paul and Tifanny are travelling in a five-seater car with 3 persons in the back and 2 in the front. Tifanny sits in the back and Josh drives. The number of different seating arrangements is", "opts": ["18", "24", "114", "120"], "ans": "A", "explain": "Josh fixed in driver seat (1 way). Tifanny chooses 1 of 3 back seats (3 ways). Remaining 3 people fill 3 seats = 3! = 6. Total = 1 Г— 3 Г— 6 = 18."}, {"id": 5, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2009, 2013, 2015, 2016, 2023", "stem": "The letters of the word IRREGULAR are to be arranged in a line. The number of possible arrangements in which the 3 Rs are <strong>NOT together</strong> is", "opts": ["7!", "9!/3! вҲ’ 7!", "9! вҲ’ 7!", "9! вҲ’ 7! Г— 3!"], "ans": "B", "explain": "Total arrangements (3 Rs repeated): 9!/3!. Treat 3Rs as one block: 7!. Not together = 9!/3! вҲ’ 7!."}, {"id": 6, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2013, 2015", "stem": "The number of distinct permutations of the letters of the word POSSIBILITY is", "opts": ["В№В№PвӮҒвӮҒ", "В№В№PвӮҒвӮҒ/(3!Г—2!)", "11!/(3!Г—2!)", "11!/3!"], "ans": "C", "explain": "POSSIBILITY: 11 letters, SГ—3, IГ—2. Distinct arrangements = 11!/(3! Г— 2!)."}, {"id": 7, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2013, 2015", "stem": "A team of five teachers is to be chosen from a group of fifteen teachers. In how many ways could this team be chosen?", "opts": ["15!/(10!5!)", "15!/10!", "15!/5!", "15!"], "ans": "A", "explain": "Order doesn't matter вҶ’ В№вҒөCвӮ… = 15!/(10! Г— 5!) = 3003."}, {"id": 8, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2013, 2016", "stem": "In how many ways can a student council of 8 students be formed from 40 students if 2 particular students must be on the council?", "opts": ["ВівҒёCвӮҶ", "ВівҒёCвӮҲ", "вҒҙвҒ°CвӮҶ", "вҒҙвҒ°CвӮҲ"], "ans": "A", "explain": "2 fixed вҶ’ choose 6 more from 38 вҶ’ ВівҒёCвӮҶ."}, {"id": 9, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2015, 2016", "stem": "In how many ways can the letters ABCDE be arranged so that A and B are <strong>always together</strong>?", "opts": ["5!", "4! Г— 2", "4!", "5!/2"], "ans": "B", "explain": "Treat AB as one block вҶ’ 4 units вҶ’ 4! arrangements. AB or BA вҶ’ Г— 2. Total = 4! Г— 2 = 48."}, {"id": 10, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙ Notable", "years": "2021, 2023", "stem": "A bag contains 3 red balls and 5 yellow balls. In how many ways can 1 red ball and 2 yellow balls be selected?", "opts": ["вҒёCвӮғ", "ВіCвӮҒ Г— вҒөCвӮӮ", "ВіCвӮҒ Г— вҒөCвӮҒ Г— вҒҙCвӮҒ", "ВіCвӮҒ + вҒөCвӮӮ"], "ans": "B", "explain": "Choose 1 red from 3 AND 2 yellow from 5 вҶ’ ВіCвӮҒ Г— вҒөCвӮӮ = 3 Г— 10 = 30."}, {"id": 11, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙ Notable", "years": "2022", "stem": "A team of 3 is chosen from 4 boys and 3 girls so that the team has exactly 2 girls. The number of ways is", "opts": ["вҒ·PвӮғ", "вҒҙPвӮҒ Г— ВіPвӮӮ", "вҒҙCвӮҒ Г— ВіCвӮӮ", "вҒҙCвӮҒ + ВіCвӮӮ"], "ans": "C", "explain": "Choose 2 girls from 3 AND 1 boy from 4 вҶ’ ВіCвӮӮ Г— вҒҙCвӮҒ = 3 Г— 4 = 12."}, {"id": 12, "topic": "Permutations & Combinations", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2009, 2022", "stem": "The binomial coefficient C(n, 2) is equivalent to", "opts": ["C(n,1) + C(n,1)", "C(n, nвҲ’2)", "C(nвҲ’2, n)", "C(n, n+2)"], "ans": "B", "explain": "By symmetry: C(n,r) = C(n, nвҲ’r). So C(n,2) = C(n, nвҲ’2)."}, {"id": 13, "topic": "Probability", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2020, 2021, 2022, 2023", "stem": "Two cards are drawn at random from a pack of 5 cards numbered 1, 2, 3, 4, 5. What is the probability that the <strong>product</strong> of the 2 numbers is <strong>PRIME</strong>?", "opts": ["2/25", "3/25", "3/10", "3/5"], "ans": "C", "explain": "Total = вҒөCвӮӮ = 10. Prime products: one must be 1 and other prime вҖ” (1,2),(1,3),(1,5) вҶ’ 3 outcomes. P = 3/10."}, {"id": 14, "topic": "Probability", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2020, 2021", "stem": "Two coins and a die (faces 1вҖ“6) are thrown together. P(2 heads AND number less than 4) =", "opts": ["2/3", "1/24", "1/8", "3/4"], "ans": "C", "explain": "P(2 heads) = 1/4. P(die < 4) = 1/2. Independent вҶ’ P = 1/4 Г— 1/2 = 1/8."}, {"id": 15, "topic": "Probability", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2021, 2022, 2023", "stem": "A sample space S consists of 3 mutually exclusive and exhaustive events Q, R and S. Given P(Q) = 0.3 and P(R) = 0.6, then P(S) =", "opts": ["0.1", "0.2", "0.6", "0.9"], "ans": "A", "explain": "Exhaustive: P(Q) + P(R) + P(S) = 1 вҶ’ P(S) = 0.1."}, {"id": 16, "topic": "Probability", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2021, 2023", "stem": "P(K only) = 0.35, P(K вҲ© L) = 0.20, P(L only) = 0.30, P(neither) = 0.15. The probability that K occurs given L has occurred is", "opts": ["0.10", "0.30", "0.40", "0.50"], "ans": "C", "explain": "P(L) = 0.20 + 0.30 = 0.50. P(K|L) = P(KвҲ©L)/P(L) = 0.20/0.50 = 0.40."}, {"id": 17, "topic": "Probability", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2013, 2015", "stem": "X and Y are mutually exclusive events. P(X) = 1/4 and P(Y) = 1/5. Then P(X вҲӘ Y) =", "opts": ["1/9", "2/5", "9/20", "1/20"], "ans": "C", "explain": "Mutually exclusive вҶ’ P(X вҲӘ Y) = P(X) + P(Y) = 1/4 + 1/5 = 9/20."}, {"id": 18, "topic": "Probability", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2013", "stem": "Events A and B: P(A) = 0.5, P(B) = 0.16, P(A вҲӘ B) = 0.48. Then P(A вҲ© B) =", "opts": ["0.14", "0.18", "0.26", "0.82"], "ans": "B", "explain": "P(AвҲ©B) = P(A) + P(B) вҲ’ P(AвҲӘB) = 0.5 + 0.16 вҲ’ 0.48 = 0.18."}, {"id": 19, "topic": "Probability", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2013, 2015", "stem": "A bag has 6 blue and 4 red balls. Two chosen without replacement. P(both red) =", "opts": ["(4/10)Г—(3/9)", "(6/10)Г—(3/9)", "(6/10)Г—(4/9)+(4/10)Г—(3/9)", "(6/10)Г—(4/9)Г—(4/10)Г—(3/9)"], "ans": "A", "explain": "P(1st red) = 4/10. P(2nd red | 1st red) = 3/9. P(both) = (4/10)Г—(3/9) = 2/15."}, {"id": 20, "topic": "Probability", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2022", "stem": "3 marbles chosen without replacement from 11 blue and 9 red (total 20). P(red then 2 blue) =", "opts": ["(9/20)+(11/19)+(10/18)", "(9/20)Г—(11/19)Г—(10/18)", "(9/20)Г—(11/20)Г—(10/20)", "(9/20)+(11/20)+(10/20)"], "ans": "B", "explain": "Without replacement: multiply conditional probabilities. P = (9/20) Г— (11/19) Г— (10/18)."}, {"id": 21, "topic": "Probability", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2022", "stem": "15 girls and 20 boys. Awards to 1st, 2nd and 3rd place. P(all 3 awards to boys) вүҲ", "opts": ["0.070", "0.150", "0.174", "0.399"], "ans": "C", "explain": "Total ways: ВівҒөCвӮғ = 6545. Boys only: ВІвҒ°CвӮғ = 1140. P = 1140/6545 вүҲ 0.174."}, {"id": 22, "topic": "Probability", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2022", "stem": "P(newborn is boy) = 0.4. In a family of 3 children, P(2 girls and 1 boy) =", "opts": ["0.192", "0.288", "0.375", "0.432"], "ans": "D", "explain": "P = C(3,1) Г— (0.6)ВІ Г— (0.4) = 3 Г— 0.36 Г— 0.4 = 0.432."}, {"id": 23, "topic": "Probability", "freq": "рҹ”Ҙ Notable", "years": "2021", "stem": "90 people: 18M+12F prefer Drink A, 35M+25F prefer Drink B. P(female AND prefers Drink B) =", "opts": ["25/90", "25/60", "60/90", "25/37"], "ans": "A", "explain": "25 females prefer Drink B out of 90. P = 25/90."}, {"id": 24, "topic": "Probability", "freq": "рҹ”Ҙ Notable", "years": "2009", "stem": "Two fair dice are rolled. P(sum = 8) =", "opts": ["1/12", "5/36", "1/6", "7/36"], "ans": "B", "explain": "Pairs summing to 8: (2,6),(3,5),(4,4),(5,3),(6,2) вҶ’ 5. Total = 36. P = 5/36."}, {"id": 25, "topic": "Matrices", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2015, 2016, 2020, 2021", "stem": "The number of possible values of x satisfying: 2x+3y+2z=вҲ’5, 4x+6y+4z=вҲ’11, 6x+9y+6z=вҲ’15 is", "opts": ["0", "1", "2", "3"], "ans": "A", "explain": "Row 2 = 2Г—Row 1 gives RHS вҲ’10 вү  вҲ’11. Contradiction вҶ’ inconsistent вҶ’ no solutions."}, {"id": 26, "topic": "Matrices", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2021, 2022, 2023", "stem": "M = [вҲ’1,0,вҲ’2; 2,вҲ’1,0; 0,x,вҲ’1] is singular. The value of x is", "opts": ["вҲ’4", "вҲ’1/4", "1/4", "+4"], "ans": "B", "explain": "det(M) = вҲ’1(1) + (вҲ’2)(2x) = вҲ’1 вҲ’ 4x. Set to 0: x = вҲ’1/4."}, {"id": 27, "topic": "Matrices", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2020, 2021", "stem": "The planes 2x+yвҲ’z=4, x+y+z=1, 3xвҲ’2yвҲ’z=2  "stem": "If PQ = 21I (I is the identity matrix), then PвҒ»В№ =", "opts": ["(PQ)вҒ»В№", "(QP)вҒ»В№", "(1/21)P", "(1/21)Q"], "ans": "D", "explain": "PQ = 21I вҶ’ P(Q/21) = I вҶ’ PвҒ»В№ = Q/21."}, {"id": 33, "topic": "Matrices", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2016, 2022", "stem": "A is a 2Г—2 matrix, I is 2Г—2 identity. Given AВІ = 3A вҲ’ 2I, then AВі =", "opts": ["6A вҲ’ 4I", "7A вҲ’ 6I", "9A вҲ’ 6I", "27A вҲ’ 8I"], "ans": "B", "explain": "AВі = AВ·AВІ = A(3AвҲ’2I) = 3AВІвҲ’2A = 3(3AвҲ’2I)вҲ’2A = 9AвҲ’6IвҲ’2A = 7AвҲ’6I."}, {"id": 34, "topic": "Matrices", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2013", "stem": "H is a non-singular square matrix. The determinant |HВІ| is", "opts": ["|H|ВІ", "(1/2)|H|", "2|H|", "1/|H|ВІ"], "ans": "A", "explain": "|HВІ| = |HВ·H| = |H|В·|H| = |H|ВІ."}, {"id": 35, "topic": "Matrices", "freq": "рҹ”Ҙ Notable", "years": "2009", "stem": "For a matrix M, if det(M) = 0, then M is", "opts": ["Non-singular", "Singular", "Symmetric", "Orthogonal"], "ans": "B", "explain": "A singular matrix has det = 0 and has no inverse."}, {"id": 36, "topic": "Matrices", "freq": "рҹ”Ҙ Notable", "years": "2016, 2022", "stem": "Which of the following about ОЈrВІ is TRUE?", "opts": ["ОЈrВІ = 2ОЈr", "ОЈrВІ = (ОЈr)ВІ", "ОЈ(2+rВІ) = 2n + ОЈrВІ", "ОЈrВІ(r=1 to n) = ОЈrВІ(r=0 to n)"], "ans": "D", "explain": "When r=0, 0ВІ=0. Adding it doesn't change the sum. So both sums are equal."}, {"id": 37, "topic": "Matrices", "freq": "рҹ”Ҙ Notable", "years": "2022", "stem": "Given ОЈk(k+1) = SвӮҷ for k=1 to n, then ОЈk(k+1) for k=(m+1) to n is", "opts": ["SвӮҷ вҲ’ SвӮҳвӮҠвӮҒ", "SвӮҳвӮҠвӮҒ вҲ’ SвӮҳ", "SвӮҷ вҲ’ SвӮҳ", "SвӮҷ вҲ’ SвӮҳвӮӢвӮҒ"], "ans": "C", "explain": "Sum from m+1 to n = (Sum 1 to n) вҲ’ (Sum 1 to m) = SвӮҷ вҲ’ SвӮҳ."}, {"id": 38, "topic": "Differential Equations", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2013, 2015, 2020, 2021, 2023", "stem": "Given y = 0 at x = 0, the general solution of yвҖі + 6yвҖІ + 9y = 0 is", "opts": ["y = eВіЛЈ + Bx", "y = BxeвҒ»ВіЛЈ", "y = eВіЛЈ(A + Bx)", "y = eвҒ»ВіЛЈ + Bx"], "ans": "B", "explain": "AQE: (m+3)ВІ = 0 вҶ’ m = вҲ’3 (repeated). CF: y = (A+Bx)eвҒ»ВіЛЈ. y(0) = 0 вҶ’ A = 0 вҶ’ y = BxeвҒ»ВіЛЈ."}, {"id": 39, "topic": "Differential Equations", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2013, 2020, 2021, 2022", "stem": "The general solution of dВІy/dxВІ вҲ’ 3(dy/dx) = 0 is", "opts": ["y = eВіЛЈ + c", "y = ceВіЛЈ", "y = cвӮҒeВіЛЈ + cвӮӮ", "y = cвӮҒeВіЛЈ + cвӮӮeвҒ»ВіЛЈ"], "ans": "C", "explain": "AQE: mВІвҲ’3m = 0 вҶ’ m(mвҲ’3) = 0 вҶ’ m = 0 or 3. CF: y = cвӮҒ + cвӮӮeВіЛЈ (equivalently cвӮҒeВіЛЈ + cвӮӮ)."}, {"id": 40, "topic": "Differential Equations", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2013, 2015, 2020, 2021, 2022, 2023", "stem": "The general solution of dy/dx = y/x is", "opts": ["y = eЛЈ", "y = kx", "y = x + k", "y = ln x + k"], "ans": "B", "explain": "Separate: dy/y = dx/x вҶ’ ln|y| = ln|x| + c вҶ’ y = kx."}, {"id": 41, "topic": "Differential Equations", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2020, 2021, 2022, 2023", "stem": "Given y = ПҖ/4 when x = 1/2, the particular solution of dy/dx = 2x cosВІy is", "opts": ["tan y = xВІ + 3/4", "tan y = 2x + 1/4", "sin y = 2x + 1", "2 cos y = xВІ + c"], "ans": "A", "explain": "Separate: secВІy dy = 2x dx вҶ’ tan y = xВІ + c. At y=ПҖ/4, x=1/2: 1 = 1/4 + c вҶ’ c = 3/4. So tan y = xВІ + 3/4."}, {"id": 42, "topic": "Differential Equations", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2013, 2015", "stem": "Auxiliary equation О»ВІ + 6О» + 50 = 0. The general solution of the ODE is", "opts": ["y = eЛЈ(A + Bx)", "integral form", "y = Ae^(О»вӮҒx) + Be^(О»вӮӮx)", "y = eбө…ЛЈ(A cos ОІx + B sin ОІx)"], "ans": "D", "explain": "Discriminant = 36 вҲ’ 200 < 0 вҶ’ complex roots. Solution: y = e^(Оұx)(A cos ОІx + B sin ОІx)."}, {"id": 43, "topic": "Differential Equations", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2020, 2021, 2022, 2023", "stem": "dВІx/dtВІ + 2dx/dt вҲ’ 5x = 4eбө—. The particular int ndition вҶ’ cвӮӮ free вҶ’ infinitely many solutions."}, {"id": 49, "topic": "Differential Equations", "freq": "рҹ”Ҙрҹ”Ҙ Repeated", "years": "2009, 2013", "stem": "The general solution of dВІy/dxВІ вҲ’ 3dy/dx + 2y = 0 is", "opts": ["y = AeЛЈ + xBeЛЈ", "y = AeЛЈ + BeВІЛЈ", "y = eЛЈ(A + Bx)", "y = eВІЛЈ(A + Bx)"], "ans": "B", "explain": "AQE: mВІ вҲ’ 3m + 2 = 0 вҶ’ (mвҲ’1)(mвҲ’2) = 0 вҶ’ m = 1, 2. CF: y = AeЛЈ + BeВІЛЈ."}, {"id": 50, "topic": "Differential Equations", "freq": "рҹ”Ҙ Notable", "years": "2016, 2022", "stem": "ds/dt = k(aвҲ’s)(bвҲ’s), a > b. An expression for s in terms of t is found by solving", "opts": ["вҲ«k/((aвҲ’x)(bвҲ’x))dx = вҲ«dy", "вҲ«1/((aвҲ’x)(bвҲ’x))dx = вҲ«k dy", "вҲ«[k/(aвҲ’x)+k/(bвҲ’x)]dx = вҲ«dy", "вҲ«(aвҲ’x)(bвҲ’x)dx = вҲ«(1/k)dy"], "ans": "B", "explain": "Separate variables: ds/((aвҲ’s)(bвҲ’s)) = k dt вҶ’ вҲ«1/((aвҲ’s)(bвҲ’s))ds = вҲ«k dt."}, {"id": 51, "topic": "Series & Sequences", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2009, 2020, 2021, 2022, 2023", "stem": "The value of ОЈ(n=1 to вҲһ) 2(1/4)^(nвҲ’1) is", "opts": ["0", "3/2", "2", "8/3"], "ans": "D", "explain": "Geometric: a = 2, r = 1/4. SвҲһ = 2/(1вҲ’1/4) = 2/(3/4) = 8/3."}, {"id": 52, "topic": "Series & Sequences", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2020, 2021, 2022, 2023", "stem": "The sum of the infinite geometric series 180 вҲ’ 60 + 20 вҲ’ ... is", "opts": ["45", "120", "135", "270"], "ans": "C", "explain": "a = 180, r = вҲ’1/3. SвҲһ = 180/(1+1/3) = 135."}, {"id": 53, "topic": "Series & Sequences", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2020, 2021, 2022, 2023", "stem": "The sum of the first n terms of a series is [1вҲ’(1/4)вҒҝ]. The value of the SECOND term is", "opts": ["3/16", "3/4", "15/16", "1"], "ans": "A", "explain": "aвӮӮ = SвӮӮ вҲ’ SвӮҒ = [1вҲ’1/16] вҲ’ [1вҲ’1/4] = 15/16 вҲ’ 12/16 = 3/16."}, {"id": 54, "topic": "Series & Sequences", "freq": "рҹ”Ҙрҹ”Ҙрҹ”Ҙ Appears every year", "years": "2009, 2013, 2015, 2020, 2021, 2022, 2023", const topicOrder=["Permutations & Combinations", "Probability", "Matrices", "Differential Equations", "Series & Sequences", "Complex Numbers", "Calculus"];
const topicIcons={"Permutations & Combinations": "\ud83c\udfb2", "Probability": "\ud83d\udcca", "Matrices": "\ud83d\udd22", "Differential Equations": "\u222b", "Series & Sequences": "\u2211", "Complex Numbers": "\u2102", "Calculus": "\u2202"};
let state={};
let currentFilter='All';
function buildUI(){
  const main=document.getElementById('main');main.innerHTML='';
  const byTopic={};
  QUESTIONS.forEach(q=>{if(!byTopic[q.topic])byTopic[q.topic]=[];byTopic[q.topic].push(q)});
  topicOrder.forEach(topic=>{
    if(!byTopic[topic])return;
    const qs=byTopic[topic];
    const sec=document.createElement('div');sec.className='topic-section';sec.dataset.topic=topic;
    sec.innerHTML=`<div class="topic-heading"><span class="topic-icon">${topicIcons[topic]}</span><span class="topic-name">${topic}</span><span class="topic-count">${qs.length} questions</span></div>`;
    qs.forEach(q=>sec.appendChild(buildCard(q)));
    main.appendChild(sec);
  });
  updateProgress();
}
function buildCard(q){
  const card=document.createElement('div');card.className='q-card';card.id=`card-${q.id}`;card.dataset.topic=q.topic;
  const labels=['A','B','C','D'];
  const optsHTML=q.opts.map((opt,i)=>`<button class="opt-btn" id="opt-${q.id}-${labels[i]}" onclick="selectOpt(${q.id},'${labels[i]}')" data-val="${labels[i]}"><span class="opt-label">${labels[i]}</span><span>${opt}</span></button>`).join('');
  card.innerHTML=`<div class="q-header"><span class="q-num">Q${q.id}</span><div class="q-meta"><div class="q-freq">${q.freq}</div><div class="q-years">рҹ“… ${q.years}</div></div><span class="result-badge" id="badge-${q.id}"></span></div><div class="q-body"><div class="q-stem">${q.stem}</div><div class="opts-grid">${optsHTML}</div><div class="q-actions"><button class="check-btn" id="check-${q.id}" onclick="checkOne(${q.id})" disabled>Check Answer</button></div><div class="explain-box" id="explain-${q.id}">${q.explain}</div></div>`;
  return card;
}
function selectOpt(qid,val){
  if(state[qid]&&state[qid].checked)return;
  if(!state[qid])state[qid]={};
  state[qid].selected=val;
  ['A','B','C','D'].forEach(l=>{const btn=document.getElementById(`opt-${qid}-${l}`);btn.classList.toggle('selected',l===val)});
  document.getElementById(`check-${qid}`).disabled=false;
  updateProgress();
}
function checkOne(qid){
  const q=QUESTIONS.find(x=>x.id===qid);
  if(!state[qid]||!state[qid].selected)return;
  state[qid].checked=true;
  const sel=state[qid].selected,correct=q.ans;
  ['A','B','C','D'].forEach(l=>{
    const btn=document.getElementById(`opt-${qid}-${l}`);
    btn.disabled=true;btn.classList.remove('selected');
    if(l===correct)btn.classList.add('correct');
    else if(l===sel&&sel!==correct)btn.classList.add('wrong');
  });
  const badge=document.getElementById(`badge-${qid}`);
  if(sel===correct){badge.textContent='вң“ Correct';badge.className='result-badge correct'}
  else{badge.textContent='вң— Wrong';badge.className='result-badge wrong'}
  document.getElementById(`explain-${qid}`).classList.add('show');
  document.getElementById(`check-${qid}`).disabled=true;
  updateProgress();
}
function submitAll(){
  QUESTIONS.forEach(q=>{if(state[q.id]&&state[q.id].selected&&!state[q.id].checked)checkOne(q.id)});
  const checked=QUESTIONS.filter(q=>state[q.id]&&state[q.id].checked);
  const correct=checked.filter(q=>state[q.id].selected===q.ans);
  const pct=checked.length>0?Math.round(correct.length/checked.length*100):0;
  document.getElementById('modalScore').textContent=correct.length;
  document.getElementById('modalTotal').textContent=checked.length;
  let msg='';
  if(pct>=80)msg='рҹҺү Excellent! You are well prepared.';
  else if(pct>=60)msg='рҹ‘Қ Good. Review the ones you missed.';
  else if(pct>=40)msg='рҹ“– Keep studying вҖ” focus on the рҹ”Ҙрҹ”Ҙрҹ”Ҙ topics.';
  else msg='рҹ’Ә More practice needed. Use the filters to focus.';
  document.getElementById('modalMsg').textContent=msg+` (${pct}%)`;
  document.getElementById('scoreModal').classList.add('show');
}
function resetAll(){state={};buildUI();filterTopic(currentFilter)}
function filterTopic(topic){
  currentFilter=topic;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(topic)||(topic==='All'&&b.textContent.startsWith('All'))));
  document.querySelectorAll('.q-card').forEach(card=>card.classList.toggle('hidden',topic!=='All'&&card.dataset.topic!==topic));
  document.querySelectorAll('.topic-section').forEach(sec=>{
    const visible=[...sec.querySelectorAll('.q-card')].some(c=>!c.classList.contains('hidden'));
    sec.style.display=visible?'':'none';
  });
}
function updateProgress(){
  const total=QUESTIONS.length;
  const answered=QUESTIONS.filter(q=>state[q.id]&&state[q.id].selected).length;
  const checked=QUESTIONS.filter(q=>state[q.id]&&state[q.id].checked).length;
  const correct=QUESTIONS.filter(q=>state[q.id]&&state[q.id].checked&&state[q.id].selected===q.ans).length;
  document.getElementById('progressFill').style.width=(answered/total*100)+'%';
  document.getElementById('answeredPill').textContent=`${answered} / ${total} answered`;
  document.getElementById('liveScore').textContent=`Score: ${correct}/${checked}`;
}
buildUI();
</script>
</body>
